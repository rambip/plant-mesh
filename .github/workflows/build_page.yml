name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  trunk-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: jetli/trunk-action@v0.5.0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Project
        working-directory: crates/bevy-demo
        shell: bash
        run: trunk build index.html --release --public-url "/${{ github.event.repository.name }}/"

      - name: Upload result
        uses: actions/upload-pages-artifact@v3
        with:
          path: crates/bevy-demo/dist/

  deploy:
    runs-on: ubuntu-latest
    needs: trunk-build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
